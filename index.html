<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória • Copa do Mundo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="game-container">
        <div id="lobby-screen" class="screen">
            <h1>Memória da Copa 🏆</h1>
            <p>Crie uma sala para desafiar seu amigo em tempo real. Quem encontrar mais pares de bandeiras vence!</p>
            <div class="input-group">
                <input type="text" id="room-input" placeholder="Nome ou ID da sala (ex: copa2026)">
                <button id="btn-join-p1" onclick="joinRoom('player1')">Criar / Entrar como Jogador 1 (Azul)</button>
                <button id="btn-join-p2" onclick="joinRoom('player2')">Entrar como Jogador 2 (Rosa)</button>
            </div>
        </div>

        <div id="game-screen" class="screen hidden">
            <header>
                <h2>MEMÓRIA DA COPA • MULTIPLAYER</h2>
                <div class="room-indicator">Sala: <span id="display-room-id">--</span> | Você é: <span id="display-player-role">--</span></div>
            </header>

            <div class="scoreboard">
                <div class="player-panel p1-panel" id="panel-player1">
                    <span class="player-title">JOGADOR 1 (AZUL)</span>
                    <span class="player-score" id="score-player1">Pares: 0</span>
                    <span class="player-status" id="status-player1">Aguardando</span>
                </div>
                <div class="player-panel p2-panel" id="panel-player2">
                    <span class="player-title">JOGADOR 2 (ROSA)</span>
                    <span class="player-score" id="score-player2">Pares: 0</span>
                    <span class="player-status" id="status-player2">Aguardando</span>
                </div>
            </div>

            <div class="turn-announcer" id="turn-message">
                Preparando o campo de jogo...
            </div>

            <div class="memory-grid" id="memory-board">
                </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
